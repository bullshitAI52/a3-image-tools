<body id="body">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        var IMAGES = [];
        var PROCESSED_FILES = []; // 用于存储处理后的图片文件 (Blob)
        var $form = document.querySelector('#form-combine');
        var $btnChoose = document.querySelector('#btn-choose');
        var $btnSubmit = document.querySelector('#btn-submit');
        var $btnReset = document.querySelector('#btn-reset');
        var $list = document.querySelector('#list-files');
        var $result = document.querySelector('#result');
        var $droper = document.querySelector('#droper');
        var $enableImagesPerRow = document.querySelector('#enableImagesPerRow');
        var $imagesPerRow = document.querySelector('#imagesPerRow');
        var $cuttingOptions = document.querySelector('#cutting-options');
        var $cuttingCanvas = document.querySelector('#cutting-canvas');
        var $modeRadios = document.querySelectorAll('input[name="mode"]');
        var $cuttingCount = document.querySelector('#cuttingCount');
        var $applyCuttingCount = document.querySelector('#applyCuttingCount');
        var $cuttingTypeRadios = document.querySelectorAll('input[name="cuttingType"]');

        // 切割相关变量
        var cuttingCanvas = $cuttingCanvas;
        var cuttingContext = cuttingCanvas.getContext('2d');
        var guideLines = []; // 参考线
        var isDragging = false;
        var draggingIndex = -1;
        var currentImage = null;
        var cuttingType = 'vertical'; // 默认垂直切割

        // 通用事件代理函数 (保持不变)
        function delegateEvent(element, event, arguments, selector, eventHandler) {
            if (event.target) {
                var selectorTagName = '';
                if (typeof(selector) === 'object' && selector.length === undefined) {
                    selectorTagName = selector.tagName.toLowerCase();
                    if (selector.getAttribute('id')) {
                        selector = '#' + selector.getAttribute('id');
                    } else if (selector.getAttribute('class')) {
                        var selector = selector.getAttribute('class').split(' ')[0];
                        selector = selector ? '.' + selector : null;
                    }
                    selector = selector || selectorTagName;
                }
                if (selector && typeof(selector) === 'string') {
                    var ROOT_SELECTORS = {
                        'document': 1,
                        'html': 1,
                        'head': 1,
                        'body': 1
                    };
                    var $target = event.target;
                    while ($target && $target !== element && $target.tagName) {
                        if ($target.matches(selector)) {
                            eventHandler.apply($target, arguments);
                            return;
                        }
                        $target = $target.parentElement;
                    }
                } else if (typeof(selector) === 'function') {
                    selector.apply(element, arguments);
                }
            }
        }

        function addEvent(elements, eventType, selector, eventHandler) {
            if (elements) {
                if (window.Window || (typeof(elements) === 'object' && elements.length === undefined)) {
                    elements = [elements];
                }
                if (elements.length && eventType) {
                    for (var i = 0; i < elements.length; i++) {
                        (function (el) {
                            if (typeof(selector) === 'function') {
                                el.addEventListener(eventType, selector);
                            } else if (typeof(eventHandler) === 'function') {
                                el.addEventListener(eventType, function (event) {
                                    delegateEvent(this, event, arguments, selector, eventHandler);
                                }, false);
                            }
                        })(elements[i]);
                    }
                }
            }
        }

        var PROTOTYPES = [Window, HTMLDocument, HTMLHeadElement, HTMLBodyElement, HTMLElement, HTMLAllCollection, HTMLCollection, NodeList];
        for (var i = 0; i < PROTOTYPES.length; i++) {
            (function (prop) {
                if (prop === Window) {
                    prop.prototype.on = prop.prototype.addEventListener;
                    prop.prototype.off = prop.prototype.removeEventListener;
                } else {
                    prop.prototype.on = function (eventType, selector, eventHandler) {
                        addEvent(this, eventType, selector, eventHandler);
                    }
                }
            })(PROTOTYPES[i]);
        }

        $list.on('click', '.icon-action', function (e) {
            e.stopPropagation();
            var ACTIONS = {
                'remove': 1,
                'move-up': 1,
                'move-down': 1
            }
            var action = this.dataset.action || '';
            var index = parseInt(this.dataset.index || -1);
            var nextIndex = -1;
            if (ACTIONS[action] && index > -1) {
                switch (action) {
                    case 'remove':
                        if (IMAGES[index]) {
                            IMAGES.splice(index, 1);
                        }
                        break;
                    case 'move-up':
                        nextIndex = index - 1;
                        nextIndex = nextIndex < 0 ? IMAGES.length - 1 : nextIndex;
                        IMAGES[index] = IMAGES.splice(nextIndex, 1, IMAGES[index])[0];
                        break;
                    case 'move-down':
                        nextIndex = index + 1;
                        nextIndex = nextIndex > IMAGES.length - 1 ? 0 : nextIndex;
                        IMAGES[index] = IMAGES.splice(nextIndex, 1, IMAGES[index])[0];
                        break;
                }
                renderImagesList();
                // 移除或移动图片后，如果只剩下一张图且在切割模式，更新画布
                var currentMode = Array.from($modeRadios).find(radio => radio.checked).value;
                if (currentMode === 'cut' && IMAGES.length === 1) {
                    currentImage = IMAGES[0];
                    applyCuttingCount();
                    cuttingCanvas.style.display = 'block';
                } else if (currentMode === 'cut' && IMAGES.length !== 1) {
                    currentImage = null;
                    cuttingCanvas.style.display = 'none';
                }
            }
        });

        function renderImagesList() {
            var html = [];
            for (var i = 0; i < IMAGES.length; i++) {
                html.push('<li>');
                html.push('<i class="icon-action icon-remove" title="移除" data-index="' + i + '" data-action="remove"></i>');
                html.push('<i class="icon-action icon-move icon-move-up" title="上移" data-index="' + i + '" data-action="move-up"></i>');
                html.push('<i class="icon-action icon-move icon-move-down" title="下移" data-index="' + i + '" data-action="move-down"></i>');
                html.push('<span class="text-filename">' + IMAGES[i].fileInfo.name + '</span>');
                html.push('</li>');
            }
            $list.innerHTML = html.join('');
        }

        function loadImages(files, callback) {
            callback = callback || function (file, image) {
                renderImagesList();
            };

            files = Array.prototype.slice.call(files || []);
            var currentMode = Array.from($modeRadios).find(radio => radio.checked).value;
            
            if (files.length) {
                var loader = function (file, callback) {
                    if (files.length) {
                        var image = new Image();
                        var reader = new FileReader();
                        reader.onload = function (e) {
                            image.onload = function () {
                                this.fileInfo = {
                                    lastModified: file.lastModified,
                                    lastModifiedDate: file.lastModifiedDate,
                                    name: file.name,
                                    size: file.size,
                                    type: file.type,
                                    webkitRelativePath: file.webkitRelativePath
                                };
                                IMAGES.push(this);
                                
                                // 仅在切割模式且只有一张图时更新切割画布和 currentImage
                                if (currentMode === 'cut') {
                                    if (IMAGES.length === 1) {
                                        currentImage = this;
                                        applyCuttingCount();
                                        cuttingCanvas.style.display = 'block';
                                    } else {
                                        currentImage = null;
                                        cuttingCanvas.style.display = 'none';
                                    }
                                }
                                
                                files.splice(0, 1);
                                image = reader = undefined;
                                if (callback && typeof(callback) === 'function') {
                                    callback(file, this);
                                }
                                loader(files[0], callback);
                            }
                            image.src = e.target.result;
                        }
                        reader.readAsDataURL(file);
                    }
                }
                loader(files[0], callback);
            } else {
                alert('未选择图片文件');
            }
        }

        function SUM(v1, v2, v3) {
            var args = Array.prototype.slice.call(arguments);
            return args.reduce((acc, val) => parseInt(acc) + parseInt(val), 0);
        }

        function MAX(v1, v2, v3) {
            var args = Array.prototype.slice.call(arguments);
            return args && args.length && args[0]!== undefined ? Math.max.apply(window, args) : 0;
        }

        function change(target, key) {
            if (target && key) {
                if (key == 'mimetype') {
                    var $groupItem = document.querySelector('#form-group-quality');
                    if (target.value == 'image/jpeg') {
                        $groupItem.style.display = 'block';
                    } else {
                        $groupItem.style.display = 'none';
                    }
                }
            }
        }

        // Promise 封装 canvas.toBlob
        function imageToBlobPromise(canvas, mimetype, quality, name) {
            return new Promise(resolve => {
                canvas.toBlob(blob => {
                    resolve({ blob: blob, name: name });
                }, mimetype, quality);
            });
        }

        // 渲染结果区域
        function renderResults() {
            if (PROCESSED_FILES.length === 0) {
                $result.innerHTML = '';
                return;
            }

            var mode = Array.from($modeRadios).find(radio => radio.checked).value;
            var html = '<label class="form-label">结果</label><div class="form-field form-field-result">';
            
            // 结果标题和打包下载按钮
            if (mode === 'combine') {
                html += '<p>已完成拼图。</p>';
            } else {
                html += `<p>已切割成 ${PROCESSED_FILES.length} 份文件。</p>`;
            }

            // 打包下载按钮 (无论是拼图还是切割，都提供)
            html += `<p><button type="button" class="btn btn-choose" id="btn-batch-download" onclick="onBatchDownload('${mode}')">
                        ${mode === 'combine' ? '打包下载 (单文件)' : '打包下载所有切割块'}
                     </button></p>`;
            
            // 显示单张图片或切割块的预览/单独下载链接
            if (mode === 'combine') {
                // 拼图模式：只显示合并后的图片
                var file = PROCESSED_FILES[0];
                var blobURL = URL.createObjectURL(file.blob);
                html += `<p>
                            <a href="${blobURL}" download="${file.name}">下载合并后的图片</a>
                            &nbsp;&nbsp;&nbsp;
                            <a target="_blank" href="${blobURL}">新窗口打开</a>
                        </p>
                        <p><img src="${blobURL}"></p>`;
            } else {
                // 切割模式：只显示链接（避免过多图片导致页面卡顿）
                PROCESSED_FILES.forEach((file, index) => {
                    var blobURL = URL.createObjectURL(file.blob);
                    html += `<p>
                                <a href="${blobURL}" download="${file.name}">下载文件 ${file.name}</a>
                                &nbsp;&nbsp;&nbsp;
                                <a target="_blank" href="${blobURL}">新窗口打开文件 ${file.name}</a>
                            </p>`;
                });
            }

            html += '</div>';
            $result.innerHTML = html;
        }

        // 打包下载
        function onBatchDownload(mode) {
            if (PROCESSED_FILES.length === 0) {
                alert('没有可以打包的文件。请先执行操作。');
                return;
            }

            if (typeof JSZip === 'undefined' || typeof saveAs === 'undefined') {
                 alert('打包功能依赖JSZip和FileSaver库，请检查网络连接或手动下载JS文件。');
                 return;
            }

            var zip = new JSZip();
            // 文件夹名：根据模式和时间戳命名
            var folderName = (mode === 'combine' ? 'combined_image' : 'cut_images') + '_' + Date.now();
            var folder = zip.folder(folderName);
            
            PROCESSED_FILES.forEach(function(file) {
                // 将 Blob 文件添加到 ZIP 文件夹中
                folder.file(file.name, file.blob);
            });

            var $btn = document.getElementById('btn-batch-download');
            var originalText = $btn.innerText;
            $btn.innerText = '正在打包...请等待';
            $btn.disabled = true;

            // 生成 ZIP 文件
            zip.generateAsync({ type: 'blob' })
                .then(function(content) {
                    // 使用 FileSaver.js 保存文件
                    saveAs(content, folderName + '.zip');
                    $btn.innerText = originalText;
                    $btn.disabled = false;
                })
                .catch(function(e) {
                    console.error(e);
                    alert('打包下载失败。');
                    $btn.innerText = originalText;
                    $btn.disabled = false;
                });
        }


        function onCombine() {
            if (IMAGES.length === 0) {
                alert('请先添加图片文件');
                return;
            }
            
            $btnSubmit.innerText = '处理中...';
            $btnSubmit.disabled = true;
            PROCESSED_FILES = []; 

            var orientation = document.querySelector('input[name="orientation"]:checked').value;
            var mimetype = document.querySelector('input[name="mimetype"]:checked').value;
            var quality = document.querySelector('input[name="quality"]:checked').value;
            var firstWidth = IMAGES[0].width;
            var firstHeight = IMAGES[0].height;
            var canvasWidth = 0;
            var canvasHeight = 0;
            var enableImagesPerRow = $enableImagesPerRow.checked;
            var imagesPerRow = parseInt($imagesPerRow.value) || 1;

            if (enableImagesPerRow) {
                var rows = Math.ceil(IMAGES.length / imagesPerRow);
                var cols = imagesPerRow;

                var maxAspectRatio = 0;
                IMAGES.forEach(img => {
                    maxAspectRatio = Math.max(maxAspectRatio, img.width / img.height);
                });

                var avgWidth = SUM(...IMAGES.map(img => img.width)) / IMAGES.length;
                var avgHeight = SUM(...IMAGES.map(img => img.height)) / IMAGES.length;

                canvasWidth = avgWidth * cols;
                canvasHeight = avgHeight * rows;
            } else {
                if (orientation == 'vertically') {
                    canvasWidth = firstWidth;
                    canvasHeight = SUM.apply(window, IMAGES.map(function (img) {
                        return parseInt(img.height * (firstWidth / img.width));
                    }));
                } else {
                    canvasWidth = SUM.apply(window, IMAGES.map(function (img) {
                        return parseInt(img.width * (firstHeight / img.height));
                    }));
                    canvasHeight = firstHeight;
                }
            }

            var canvas = document.createElement('canvas');
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            var context = canvas.getContext('2d');
            var offsetX = 0;
            var offsetY = 0;

            var fileName = 'pingtu-' + (new Date()).getTime();
            if (mimetype == 'image/jpeg') {
                context.fillStyle = '#FFFFFF';
                context.fillRect(0, 0, canvas.width, canvas.height);
                quality = parseFloat(quality);
                fileName += '.jpg';
            } else {
                quality = undefined;
                fileName += '.png';
            }
            
            if (enableImagesPerRow) {
                var cellWidth = canvasWidth / imagesPerRow;
                var cellHeight = canvasHeight / Math.ceil(IMAGES.length / imagesPerRow);

                IMAGES.forEach((img, index) => {
                    var row = Math.floor(index / imagesPerRow);
                    var col = index % imagesPerRow;
                    var x = col * cellWidth;
                    var y = row * cellHeight;

                    var imgAspectRatio = img.width / img.height;
                    var cellAspectRatio = cellWidth / cellHeight;

                    var scale, drawWidth, drawHeight, drawX, drawY;

                    // 适应模式：保持图片比例，居中显示
                    if (imgAspectRatio > cellAspectRatio) {
                        scale = cellWidth / img.width;
                        drawWidth = cellWidth;
                        drawHeight = img.height * scale;
                        drawX = x;
                        drawY = y + (cellHeight - drawHeight) / 2;
                    } else {
                        scale = cellHeight / img.height;
                        drawWidth = img.width * scale;
                        drawHeight = cellHeight;
                        drawX = x + (cellWidth - drawWidth) / 2;
                        drawY = y;
                    }

                    context.drawImage(img, drawX, drawY, drawWidth, drawHeight);
                });
            } else {
                IMAGES.forEach(function (img) {
                    var scale;
                    if (orientation == 'vertically') {
                        scale = firstWidth / img.width;
                        var drawHeight = img.height * scale;
                        context.drawImage(img, 0, offsetY, firstWidth, drawHeight);
                        offsetY += drawHeight;
                    } else {
                        scale = firstHeight / img.height;
                        var drawWidth = img.width * scale;
                        context.drawImage(img, offsetX, 0, drawWidth, firstHeight);
                        offsetX += drawWidth;
                    }
                });
            }

            // 使用 Promise 异步转换
            imageToBlobPromise(canvas, mimetype, quality, fileName)
                .then(file => {
                    PROCESSED_FILES.push(file); 
                    renderResults();
                })
                .finally(() => {
                    $btnSubmit.innerText = '执行';
                    $btnSubmit.disabled = false;
                });
        }

        /**
         * @async
         * 优化的 onCut 函数：使用 [源图序号]-[切块序号].(ext) 命名格式
         */
        async function onCut() {
            if (IMAGES.length === 0) {
                alert('请先添加图片文件');
                return;
            }
            
            const originalButtonText = $btnSubmit.innerText;
            $btnSubmit.innerText = '准备切割...';
            $btnSubmit.disabled = true;
            PROCESSED_FILES = []; 

            const mimetype = document.querySelector('input[name="mimetype"]:checked').value;
            const quality = document.querySelector('input[name="quality"]:checked').value;
            const cuttingType = document.querySelector('input[name="cuttingType"]:checked').value;
            let count = parseInt($cuttingCount.value) || 2;
            count = Math.max(2, Math.min(10, count)); 
            
            let fileIndex = 0; // 0-based index for iteration
            let totalCuts = 0; // Total cuts for progress display

            try {
                // Step 1: Count total cuts for better progress indication
                for (const image of IMAGES) {
                    if (IMAGES.length === 1 && guideLines.length === count - 1) {
                         // Use custom guideLines count if in single-image cut mode
                         totalCuts += guideLines.length + 1;
                    } else {
                         // Use default count for batch or fixed mode
                         totalCuts += count;
                    }
                }
                
                let currentCut = 0; // Global cut counter for progress
                
                // Step 2: Process images
                for (const image of IMAGES) {
                    fileIndex++; 
                    const imageIndexPadded = fileIndex.toString().padStart(2, '0'); // e.g., '01', '02'
                    
                    const canvasWidth = image.width;
                    const canvasHeight = image.height;
                    let positions = [];
                    let regions = [];

                    // 实时更新按钮进度
                    $btnSubmit.innerText = `切割中: ${fileIndex} / ${IMAGES.length} 张图...`;

                    if (IMAGES.length === 1 && guideLines.length === count - 1) {
                        // 单图模式：使用手动调整的参考线 (guideLines)
                        guideLines.sort((a, b) => a.position - b.position);
                        positions = guideLines.map(line => line.position);
                    } else {
                        // 批量或默认模式：使用等比例切割 (基于 count)
                        const totalSize = cuttingType === 'vertical' ? canvasWidth : canvasHeight;
                        for (let i = 1; i < count; i++) {
                            positions.push(totalSize * i / count);
                        }
                    }

                    // 定义切割区域
                    let start = 0;
                    positions.forEach(pos => {
                        regions.push({ start: start, end: pos });
                        start = pos;
                    });
                    regions.push({ start: start, end: cuttingType === 'vertical' ? canvasWidth : canvasHeight });

                    let regionIndex = 0; // 0-based index for cuts within the current image
                    // 顺序处理每个区域 (async/await 保证低内存消耗)
                    for (const region of regions) {
                        currentCut++; // Update global progress counter

                        const canvas = document.createElement('canvas');
                        const regionSize = region.end - region.start;
                        
                        if (cuttingType === 'vertical') {
                            canvas.width = regionSize;
                            canvas.height = canvasHeight;
                        } else {
                            canvas.width = canvasWidth;
                            canvas.height = regionSize;
                        }
                        
                        const context = canvas.getContext('2d');
                        
                        if (cuttingType === 'vertical') {
                            context.drawImage(image, region.start, 0, regionSize, canvasHeight, 0, 0, regionSize, canvasHeight);
                        } else {
                            context.drawImage(image, 0, region.start, canvasWidth, regionSize, 0, 0, canvasWidth, regionSize);
                        }
                        
                        regionIndex++; // Current piece index (1, 2, 3, ...)
                        const regionIndexPadded = regionIndex.toString().padStart(2, '0'); // e.g., '01', '02'

                        // *** 新命名格式: [源图序号]-[切块序号] ***
                        let fileName = `${imageIndexPadded}-${regionIndexPadded}`; 
                        // *****************************************

                        let finalQuality = quality;
                        
                        if (mimetype == 'image/jpeg') {
                            finalQuality = parseFloat(quality);
                            fileName += '.jpg';
                        } else {
                            finalQuality = undefined;
                            fileName += '.png';
                        }
                        
                        // 关键：等待 toBlob 完成，释放当前 canvas 内存，再进行下一个
                        const file = await imageToBlobPromise(canvas, mimetype, finalQuality, fileName);
                        PROCESSED_FILES.push(file); 
                        
                        // 每次切割完成后，清理临时创建的 canvas 元素，帮助浏览器回收内存
                        canvas.width = 1;
                        canvas.height = 1;
                    }
                }

                // 所有处理完成后，渲染结果
                renderResults(); 

            } catch (error) {
                console.error("切割处理失败:", error);
                alert("切割处理过程中发生错误。请尝试减少图片数量或降低质量。");
            } finally {
                $btnSubmit.innerText = originalButtonText;
                $btnSubmit.disabled = false;
            }
        }

        function onSubmit(e) {
            // 关键修复：阻止默认的表单提交行为，防止页面跳转
            if (e) {
                e.preventDefault(); 
            }

            var mode = Array.from($modeRadios).find(radio => radio.checked).value;
            if (mode === 'combine') {
                onCombine();
            } else {
                onCut();
            }
            
            // 返回 false 确保兼容性
            return false;
        }

        $btnChoose.addEventListener('click', function (e) {
            var $input = document.createElement('input');
            $input.setAttribute('type', 'file');
            $input.setAttribute('name', 'file');
            $input.setAttribute('accept', 'image/*');
            $input.setAttribute('multiple', 'multiple');
            $input.addEventListener('change', function (evt) {
                loadImages(evt.target.files);
            }, false);
            $input.click();
        }, false);


        $btnReset.addEventListener('click', function (e) {
            IMAGES = [];
            PROCESSED_FILES = []; 
            $list.innerHTML = '';
            $result.innerHTML = '';
            cuttingCanvas.style.display = 'none';
            currentImage = null;
            guideLines = [];
        }, false);

        document.addEventListener('dragleave', function (e) {
            e.preventDefault();
        }, false);
        document.addEventListener('drop', function (e) {
            e.preventDefault();
            $droper.classList.remove('active');
        }, false);
        document.addEventListener('dragenter', function (e) {
            e.preventDefault();
            $droper.classList.add('active');
        }, false);
        document.addEventListener('dragover', function (e) {
            e.preventDefault();
            $droper.classList.add('active');
        }, false);


        $droper.addEventListener('drop', function (e) {
            e.preventDefault();
            if (e.dataTransfer && e.dataTransfer.files) {
                loadImages(e.dataTransfer.files);
            }
            $droper.classList.remove('active');
        });

        window.addEventListener('paste', function (e) {
            var items = e.clipboardData.items;
            var files = [];
            var tmp;
            for (var i = 0; i < items.length; i++) {
                tmp = items[i];
                if (tmp.kind === 'file' && tmp.type) {
                    tmp = tmp.getAsFile();
                    if (tmp) {
                        files.push(tmp);
                    }
                }
            }
            tmp = undefined;
            loadImages(files);
        });

        // 模式切换逻辑
        $modeRadios.forEach(radio => {
            radio.addEventListener('change', function () {
                var isCutMode = this.value === 'cut';
                
                $cuttingOptions.style.display = isCutMode ? 'block' : 'none';
                
                if (isCutMode && IMAGES.length === 1) {
                    cuttingCanvas.style.display = 'block';
                    currentImage = IMAGES[0];
                    applyCuttingCount();
                } else {
                    cuttingCanvas.style.display = 'none';
                    if (!isCutMode) {
                        currentImage = null; 
                    }
                }
            });
        });

        // 切割相关函数
        function updateCuttingCanvas() {
            if (!currentImage) return; 
            
            cuttingCanvas.width = currentImage.width;
            cuttingCanvas.height = currentImage.height;
            
            cuttingContext.drawImage(currentImage, 0, 0, cuttingCanvas.width, cuttingCanvas.height);
            
            guideLines.forEach(line => {
                cuttingContext.fillStyle = 'rgba(255, 0, 0, 0.5)';
                if (cuttingType === 'vertical') {
                    cuttingContext.fillRect(line.position, 0, 2, cuttingCanvas.height);
                } else {
                    cuttingContext.fillRect(0, line.position, cuttingCanvas.width, 2);
                }
            });
        }

        function applyCuttingCount() {
            if (!currentImage) return; 
            
            var count = parseInt($cuttingCount.value) || 2;
            count = Math.max(2, Math.min(10, count)); 
            
            cuttingType = document.querySelector('input[name="cuttingType"]:checked').value;
            
            guideLines = [];
            if (cuttingType === 'vertical') {
                for (var i = 1; i < count; i++) {
                    guideLines.push({
                        position: currentImage.width * i / count,
                        type: 'vertical'
                    });
                }
            } else {
                for (var i = 1; i < count; i++) {
                    guideLines.push({
                        position: currentImage.height * i / count,
                        type: 'horizontal'
                    });
                }
            }
            
            cuttingCanvas.style.display = 'block';
            updateCuttingCanvas();
        }

        $applyCuttingCount.addEventListener('click', applyCuttingCount);

        $cuttingTypeRadios.forEach(radio => {
            radio.addEventListener('change', function () {
                cuttingType = this.value;
                if (currentImage) {
                    applyCuttingCount();
                }
            });
        });

        // 处理参考线拖动
        cuttingCanvas.addEventListener('mousedown', function (e) {
            if (!currentImage || guideLines.length === 0) return;
            
            var rect = cuttingCanvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            
            for (var i = 0; i < guideLines.length; i++) {
                var line = guideLines[i];
                if (cuttingType === 'vertical') {
                    if (Math.abs(x - line.position) <= 5) {
                        isDragging = true;
                        draggingIndex = i;
                        break;
                    }
                } else {
                    if (Math.abs(y - line.position) <= 5) {
                        isDragging = true;
                        draggingIndex = i;
                        break;
                    }
                }
            }
        });

        document.addEventListener('mousemove', function (e) {
            if (!isDragging || draggingIndex === -1) return;
            
            var rect = cuttingCanvas.getBoundingClientRect();
            var position;
            
            if (cuttingType === 'vertical') {
                position = e.clientX - rect.left;
                // 限制在画布范围内，并且不超过相邻参考线
                position = Math.max(0, Math.min(currentImage.width, position));
                if (draggingIndex > 0) {
                    position = Math.max(position, guideLines[draggingIndex - 1].position + 10);
                }
                if (draggingIndex < guideLines.length - 1) {
                    position = Math.min(position, guideLines[draggingIndex + 1].position - 10);
                }
            } else {
                position = e.clientY - rect.top;
                // 限制在画布范围内，并且不超过相邻参考线
                position = Math.max(0, Math.min(currentImage.height, position));
                if (draggingIndex > 0) {
                    position = Math.max(position, guideLines[draggingIndex - 1].position + 10);
                }
                if (draggingIndex < guideLines.length - 1) {
                    position = Math.min(position, guideLines[draggingIndex + 1].position - 10);
                }
            }
            
            guideLines[draggingIndex].position = position;
            updateCuttingCanvas();
        });

        document.addEventListener('mouseup', function (e) {
            isDragging = false;
            draggingIndex = -1;
        });
    </script>
</body>

</html>
