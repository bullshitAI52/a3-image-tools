<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片拼图与切割工具</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent-color: #0f3460;
            --highlight-color: #e94560;
            --text-color: #f0f0f0;
            --card-bg: rgba(22, 33, 62, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #0f0f1a 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(15, 52, 96, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h2 {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .container {
            flex: 1;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* 统一面板样式 */
        .panel {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #8a8a9b;
            text-transform: uppercase;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        /* 模式切换 Tab */
        .mode-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .mode-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            opacity: 0.6;
            font-weight: 600;
        }

        .mode-tab.active {
            background: var(--highlight-color);
            opacity: 1;
            box-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
        }

        /* 控件样式 */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            opacity: 0.8;
        }

        .radio-label:hover {
            opacity: 1;
        }

        input[type="radio"] {
            accent-color: var(--highlight-color);
            transform: scale(1.1);
        }

        input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }

        /* 文件上传 */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .drop-zone:hover {
            border-color: var(--highlight-color);
            background: rgba(233, 69, 96, 0.05);
        }

        .drop-zone i {
            font-size: 2.5rem;
            color: #8a8a9b;
            margin-bottom: 15px;
            display: block;
        }

        /* 图片列表 */
        .image-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .image-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .image-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .image-info {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        .image-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
        }

        .image-name {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .image-actions {
            display: flex;
            gap: 5px;
            opacity: 0.6;
        }

        .image-item:hover .image-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: var(--highlight-color);
        }

        /* 按钮 */
        .btn {
            background: var(--highlight-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #ff5772;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        /* 右侧预览区 */
        .preview-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 20px;
            position: relative;
        }

        #preview-img {
            max-width: 100%;
            max-height: 600px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            display: none;
        }

        /* 结果列表 (切割模式) */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .result-item img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .result-link {
            display: block;
            color: var(--highlight-color);
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .result-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <h2><i class="fas fa-shapes"></i> 图片拼图 & 切割 <span
                style="font-size:0.8rem; opacity:0.6; font-weight:400; margin-left:10px">v2.0</span></h2>
    </header>

    <div class="container">
        <!-- 左侧设置 -->
        <div class="panel">
            <div class="panel-header">工具箱</div>
            <div class="panel-body">
                <div class="mode-tabs">
                    <div class="mode-tab active" onclick="switchMode('combine')">🧩 拼长图</div>
                    <div class="mode-tab" onclick="switchMode('cut')">✂️ 切图片</div>
                </div>

                <!-- 上传区 -->
                <div class="drop-zone" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <div>点击或拖拽图片</div>
                    <div style="font-size:0.8rem; opacity:0.6; margin-top:5px">支持 PNG, JPG, JPEG</div>
                    <input type="file" id="file-input" multiple accept="image/*" style="display:none"
                        onchange="handleFiles(this.files)">
                </div>

                <ul id="image-list" class="image-list"></ul>
                <div style="text-align:right; margin-bottom:20px; font-size:0.85rem; opacity:0.6" id="file-count">0 张图片
                </div>

                <!-- 拼图设置 -->
                <div id="combine-settings">
                    <div class="control-group">
                        <label>拼接方向</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="direction" value="vertical" checked> 纵向
                                (长图)</label>
                            <label class="radio-label"><input type="radio" name="direction" value="horizontal">
                                横向</label>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>每行图片数 (网格拼接)</label>
                        <input type="number" id="cols" value="1" min="1">
                    </div>
                </div>

                <!-- 切割设置 -->
                <div id="cut-settings" style="display:none">
                    <div class="control-group">
                        <label>切割方向</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="cut-dir" value="vertical" checked> 垂直切割
                                (切成几段)</label>
                            <label class="radio-label"><input type="radio" name="cut-dir" value="horizontal">
                                水平切割</label>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>切割份数</label>
                        <input type="number" id="cut-count" value="2" min="2" max="50">
                    </div>
                </div>

                <div class="control-group">
                    <label>输出质量 (JPEG)</label>
                    <div class="radio-group" style="font-size:0.9rem">
                        <label class="radio-label"><input type="radio" name="quality" value="0.95" checked> 最佳</label>
                        <label class="radio-label"><input type="radio" name="quality" value="0.8"> 高</label>
                        <label class="radio-label"><input type="radio" name="quality" value="0.6"> 中</label>
                    </div>
                </div>

                <button id="action-btn" class="btn" onclick="processImages()">
                    <i class="fas fa-magic"></i> 开始生成
                </button>
                <button id="reset-btn" class="btn btn-secondary" onclick="resetAll()">
                    <i class="fas fa-undo"></i> 重置所有
                </button>
            </div>
        </div>

        <!-- 右侧预览 -->
        <div class="panel">
            <div class="panel-header">
                <span>预览与结果</span>
                <button id="download-zip-btn" class="action-btn" style="font-size:0.9rem; display:none"
                    onclick="downloadZip()">
                    <i class="fas fa-file-archive"></i> 打包下载 (ZIP)
                </button>
            </div>
            <div class="panel-body preview-content" id="preview-area">
                <div style="text-align:center; opacity:0.3">
                    <i class="fas fa-image" style="font-size:4rem; margin-bottom:20px"></i>
                    <p>等待处理...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        let currentMode = 'combine'; // combine | cut
        let images = []; // { id, file, src, width, height }
        let processedResults = []; // { blob, name, url }

        // --- 模式切换 ---
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('combine-settings').style.display = mode === 'combine' ? 'block' : 'none';
            document.getElementById('cut-settings').style.display = mode === 'cut' ? 'block' : 'none';

            // 更新按钮文案
            document.querySelector('#action-btn').innerHTML =
                mode === 'combine' ? '<i class="fas fa-puzzle-piece"></i> 开始拼图' : '<i class="fas fa-cut"></i> 开始切割';

            // 如果只有一张图且切到切割模式，自动提示
            if (mode === 'cut' && images.length > 1) {
                alert('提示：切割模式下通常只处理第一张图片，或请先清空列表只上传一张。');
            }
        }

        // --- 文件处理 ---
        function handleFiles(fileList) {
            const newFiles = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            if (newFiles.length === 0) return;

            let loadedCount = 0;
            newFiles.forEach(f => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        images.push({
                            id: Date.now() + Math.random(),
                            file: f,
                            src: e.target.result,
                            width: img.width,
                            height: img.height,
                            imgObj: img
                        });
                        loadedCount++;
                        if (loadedCount === newFiles.length) renderImageList();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(f);
            });
        }

        // 拖拽支持
        const dropZone = document.querySelector('.drop-zone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#e94560'; });
        dropZone.addEventListener('dragleave', e => { e.preventDefault(); dropZone.style.borderColor = ''; });
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            handleFiles(e.dataTransfer.files);
        });

        function renderImageList() {
            const list = document.getElementById('image-list');
            list.innerHTML = '';
            document.getElementById('file-count').innerText = `${images.length} 张图片`;

            images.forEach((img, index) => {
                const li = document.createElement('li');
                li.className = 'image-item';
                li.innerHTML = `
                    <div class="image-info">
                        <img src="${img.src}" class="image-thumb">
                        <div class="image-name" title="${img.file.name}">${img.file.name}</div>
                    </div>
                    <div class="image-actions">
                        <button class="action-btn" onclick="moveImage(${index}, -1)" title="上移"><i class="fas fa-arrow-up"></i></button>
                        <button class="action-btn" onclick="moveImage(${index}, 1)" title="下移"><i class="fas fa-arrow-down"></i></button>
                        <button class="action-btn" onclick="removeImage(${index})" title="删除" style="color:#ff6b6b"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function removeImage(index) {
            images.splice(index, 1);
            renderImageList();
        }

        function moveImage(index, direction) {
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < images.length) {
                [images[index], images[newIndex]] = [images[newIndex], images[index]];
                renderImageList();
            }
        }

        function resetAll() {
            images = [];
            processedResults = [];
            renderImageList();
            document.getElementById('preview-area').innerHTML = `
                <div style="text-align:center; opacity:0.3">
                    <i class="fas fa-image" style="font-size:4rem; margin-bottom:20px"></i>
                    <p>等待处理...</p>
                </div>
            `;
            document.getElementById('download-zip-btn').style.display = 'none';
        }

        // --- 核心处理逻辑 ---
        async function processImages() {
            if (images.length === 0) return alert('请先上传图片！');

            const btn = document.getElementById('action-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中...';

            processedResults = []; // 清空上次结果
            const quality = parseFloat(document.querySelector('input[name="quality"]:checked').value);

            try {
                if (currentMode === 'combine') {
                    await doCombine(quality);
                } else {
                    await doCut(quality);
                }
            } catch (err) {
                console.error(err);
                alert('处理失败: ' + err.message);
            }

            btn.disabled = false;
            btn.innerHTML = currentMode === 'combine' ? '<i class="fas fa-magic"></i> 开始生成' : '<i class="fas fa-cut"></i> 开始切割';
        }

        // 拼图逻辑
        async function doCombine(quality) {
            const direction = document.querySelector('input[name="direction"]:checked').value;
            const cols = parseInt(document.getElementById('cols').value) || 1;

            // 计算画布尺寸
            let canvasWidth = 0, canvasHeight = 0;

            // 简单处理：如果是单列纵向，即所有图片宽度统一为第一张图宽度，高度累加
            // 如果是网格，需要更复杂计算。为了简化且保证质量，我们以第一张图的尺寸为基准进行缩放对齐

            const baseWidth = images[0].width;

            // 针对每一张图，计算其缩放到 baseWidth 后的高度
            // 实际上为了更好地拼接，我们不用缩放，而是直接画。
            // 但如果图片尺寸差异巨大，拼接会很难看。这里假设用户上传的图尺寸相近，或者我们按最大宽度统一。

            // 策略：统一宽度模式（适用于长图）。
            // 找出最大宽度
            const maxWidth = Math.max(...images.map(i => i.width));

            if (direction === 'vertical' && cols === 1) {
                // 经典长图模式
                canvasWidth = maxWidth;
                canvasHeight = images.reduce((acc, img) => acc + (img.height * (maxWidth / img.width)), 0);
            } else if (direction === 'horizontal') {
                // 横向拼接：统一高度
                const maxHeight = Math.max(...images.map(i => i.height));
                canvasHeight = maxHeight;
                canvasWidth = images.reduce((acc, img) => acc + (img.width * (maxHeight / img.height)), 0);
            } else {
                // 网格待实现，或者简单按照原始尺寸拼
                // 这里简化处理：暂时只支持这两种最常用的。网格拼图逻辑复杂
                // 如果 cols > 1，强制转为 grid 逻辑（仅支持纵向排列 grid）
                // 简单 Grid：每行等宽
                const cellWidth = maxWidth; // 其实应该这一行里最大的
                // ... 这个逻辑比较复杂，先实现基础的单列长图
                if (cols > 1) alert("多列网格拼接逻辑较复杂，建议先把图片处理成一样大小。当前将尝试按原图拼接。");
            }

            // *** 修正：实现一个简单的 Grid 拼接 ***
            const inputCols = cols;
            // 计算每一行的最大高度
            let rows = Math.ceil(images.length / inputCols);
            let rowHeights = new Array(rows).fill(0);
            let colWidths = new Array(inputCols).fill(0);

            // 第一次遍历：计算网格尺寸
            // 这种计算方式假设不对图片进行缩放，直接原样拼
            // 如果要像“美图秀秀”那样拼，通常需要由容器宽度倒推。
            // 这里我们采用：不做缩放，直接原样拼接。以图片本身尺寸为准。

            let gridMap = []; // [row][col] = img
            let c = 0;
            for (let i = 0; i < images.length; i++) {
                let r = Math.floor(i / inputCols);
                let col = i % inputCols;
                rowHeights[r] = Math.max(rowHeights[r], images[i].height);
                colWidths[col] = Math.max(colWidths[col], images[i].width);
            }

            canvasWidth = colWidths.reduce((a, b) => a + b, 0);
            canvasHeight = rowHeights.reduce((a, b) => a + b, 0);

            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight); // 白底

            let currentX = 0;
            let currentY = 0;

            for (let r = 0; r < rows; r++) {
                currentX = 0;
                for (let cl = 0; cl < inputCols; cl++) {
                    const idx = r * inputCols + cl;
                    if (idx < images.length) {
                        const img = images[idx].imgObj;
                        // 居中绘制？还是左上角？ 这里选左上角
                        // 如果这一格的图片比格子小，居中可能更好
                        const cellW = colWidths[cl];
                        const cellH = rowHeights[r];

                        // 居中计算
                        const x = currentX + (cellW - img.width) / 2;
                        const y = currentY + (cellH - img.height) / 2;

                        ctx.drawImage(img, x, y);
                    }
                    currentX += colWidths[cl];
                }
                currentY += rowHeights[r];
            }

            // 生成结果
            await new Promise(r => canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                processedResults.push({
                    blob: blob,
                    url: url,
                    name: `combined_${Date.now()}.jpg`
                });
                renderPreviewCombine(url);
                r();
            }, 'image/jpeg', quality));
        }

        // 切割逻辑
        async function doCut(quality) {
            // 只处理第一张图
            const img = images[0].imgObj;
            const cutDir = document.querySelector('input[name="cut-dir"]:checked').value;
            const count = parseInt(document.getElementById('cut-count').value);

            const w = img.width;
            const h = img.height;
            const step = cutDir === 'vertical' ? (h / count) : (w / count); // vertical是切成几段（即横着切几刀，垂直分布）
            // 修正：vertical 意思是“垂直方向排列”，还是“切垂直线”？
            // 通常“垂直切割”指切成 1 | 2 | 3 （竖条）。“水平切割”指切成 三明治（横条）。
            // 对应代码里 radio text: "垂直切割 (切成几段)" 这个描述有点歧义。
            // 根据之前逻辑：
            // Vertical -> 切成竖条 (width / count)
            // Horizontal -> 切成横条 (height / count)

            // 但用户界面上写的是 "垂直切割 (切成几段)" -> 可能是指结果是垂直排列的？即横着切？
            // 让我们按图标理解：||| 是竖切， ☰ 是横切。
            // 修正代码逻辑：
            // value="vertical" -> 竖切 (Vertical Slices) -> changing X
            // value="horizontal" -> 横切 (Horizontal Slices) -> changing Y

            processedResults = [];
            const isVert = cutDir === 'vertical';
            const size = isVert ? Math.floor(w / count) : Math.floor(h / count);

            for (let i = 0; i < count; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = isVert ? size : w;
                canvas.height = isVert ? h : size;
                const ctx = canvas.getContext('2d');

                // 绘制参数
                const sx = isVert ? i * size : 0;
                const sy = isVert ? 0 : i * size;
                const sw = isVert ? size : w;
                const sh = isVert ? h : size;

                ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

                await new Promise(r => canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    processedResults.push({
                        blob: blob,
                        url: url,
                        name: `${images[0].file.name}_${i + 1}.jpg`
                    });
                    r();
                }, 'image/jpeg', quality));
            }

            renderPreviewCut();
        }

        // --- 渲染结果 ---
        function renderPreviewCombine(url) {
            const area = document.getElementById('preview-area');
            area.innerHTML = `
                <img id="preview-img" src="${url}" style="display:block">
                <a href="${url}" download="combined.jpg" class="btn" style="margin-top:20px; width:auto">
                    <i class="fas fa-download"></i> 下载图片
                </a>
            `;
            document.getElementById('download-zip-btn').style.display = 'none'; // 单张不需要zip
        }

        function renderPreviewCut() {
            const area = document.getElementById('preview-area');
            let html = '<div class="result-grid">';
            processedResults.forEach((item, i) => {
                html += `
                    <div class="result-item">
                        <img src="${item.url}">
                        <div>#${i + 1}</div>
                        <a href="${item.url}" download="${item.name}" class="result-link">下载</a>
                    </div>
                `;
            });
            html += '</div>';
            area.innerHTML = html;
            document.getElementById('download-zip-btn').style.display = 'inline-block';
        }

        function downloadZip() {
            if (processedResults.length === 0) return;
            const zip = new JSZip();
            processedResults.forEach(item => {
                zip.file(item.name, item.blob);
            });
            zip.generateAsync({ type: "blob" }).then(function (content) {
                saveAs(content, "images.zip");
            });
        }

    </script>
</body>

</html>
