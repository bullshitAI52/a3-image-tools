        .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #2d3748;
        }

        .description {
            font-size: 0.95rem;
            color: #718096;
            line-height: 1.6;
        }

        .badge {

            top: 20px;
            right: 20px;
            background: #ff7675;
            color: white;
            font-size: 0.75rem;
            padding: 4px 10px;
